<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriangleAi - Log Triage System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #333;
            font-size: 24px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultBox {
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap; /* Keeps JSON formatting neat */
            display: none; /* Hidden until we get a result */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚨 TriangleAi</h1>
        <p>Paste an IT error log or ticket below to triage:</p>
        
        <textarea id="logInput" placeholder="e.g. CRITICAL ALERT: The main fiber optic switch in rack 4B just caught fire..."></textarea>
        
        <button onclick="analyzeLog()">Analyze Log</button>
        
                <div id="resultBox"></div>
        <div style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 15px;">
        <h2>📋 Recent Tickets</h2>
        <div id="historyList" style="font-family: monospace; font-size: 14px; color: #555;">
            Loading history...
        </div>
    </div>
    </div>
    

        <script>
        async function analyzeLog() {
            const logText = document.getElementById('logInput').value;
            const resultBox = document.getElementById('resultBox');

            if (!logText) {
                alert("Please paste a log first!");
                return;
            }

            // Show loading state
            resultBox.style.display = 'block';
            resultBox.style.backgroundColor = '#fff';
            resultBox.style.borderColor = '#ccc';
            resultBox.innerText = "Querying TriangleAi Engine...";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ logText: logText })
                });

                const data = await response.json();
                resultBox.innerText = JSON.stringify(data, null, 2);

                if (data.status.includes("CRITICAL")) {
                    resultBox.style.backgroundColor = "#ffebee";
                    resultBox.style.borderColor = "red";
                } else if (data.status.includes("NORMAL")) {
                    resultBox.style.backgroundColor = "#fff9c4";
                    resultBox.style.borderColor = "orange";
                } else {
                    resultBox.style.backgroundColor = "#e8f5e9";
                    resultBox.style.borderColor = "green";
                }

            } catch (error) {
                resultBox.innerText = "Error connecting to TriangleAi backend.";
                resultBox.style.borderColor = "red";
            }
            
            // After analyzing, refresh the history box!
            loadHistory();
        }

        // KEEP THIS OUTSIDE THE analyzeLog FUNCTION
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const history = await response.json();
                const historyDiv = document.getElementById('historyList');
                
                if (history.length === 0) {
                    historyDiv.innerText = "No tickets analyzed yet.";
                    return;
                }

                // Clear the old history so it doesn't duplicate
                historyDiv.innerHTML = ""; 

                // Reverse the array so newest tickets show first
                history.slice(-5).reverse().forEach(ticket => {
                    const color = ticket.status.includes("CRITICAL") ? "red" : 
                                  ticket.status.includes("NORMAL") ? "orange" : "green";
                    historyDiv.innerHTML += `<span style="color:${color}; font-weight:bold;">[${ticket.status.split(' - ')[0]}]</span> ${ticket.summary} <br><br>`;
                });
            } catch (error) {
                console.error("History fetch error:", error);
            }
        }

        // Load history the moment the page opens
        loadHistory();
    </script>

</body>
</html>
